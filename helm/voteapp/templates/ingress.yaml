apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voteapp-ingress
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voteapp-api
                port:
                  number: 80
