name: CI/CD - Build, Push, Update Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'              # only trigger when app code changes

permissions:
  contents: write              # allows this workflow to push commits back

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag (short commit SHA)
        id: vars
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/voteapp:${{ steps.vars.outputs.TAG }}

      - name: Update image tag in values.yaml
        run: |
          sed -i "s|image: .*voteapp:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/voteapp:${{ steps.vars.outputs.TAG }}|g" helm/voteapp/values.yaml
          cat helm/voteapp/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/voteapp/values.yaml
          git commit -m "ci: update voteapp image to ${{ steps.vars.outputs.TAG }}" || echo "No changes to commit"
          git push
